<div class="container mt-4">

    <h2>Reactive Form Example</h2>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">

        <!-- Name -->
        <div class="mb-3">

            <label>Name</label>

            <input
                type="text"
                class="form-control"
                formControlName="name">

            <div
                class="text-danger"
                *ngIf="submitted && f['name'].errors">

                <small *ngIf="f['name'].errors['required']">
                    Name is required.
                </small>

                <small *ngIf="f['name'].errors['minlength']">
                    Minimum 3 characters.
                </small>

            </div>

        </div>

        <!-- Email -->

        <div class="mb-3">

            <label>Email</label>

            <input
                type="email"
                class="form-control"
                formControlName="email">

            <div
                class="text-danger"
                *ngIf="submitted && f['email'].errors">

                <small *ngIf="f['email'].errors['required']">
                    Email is required.
                </small>

                <small *ngIf="f['email'].errors['email']">
                    Invalid email.
                </small>

            </div>

        </div>

        <!-- Password -->

        <div class="mb-3">

            <label>Password</label>

            <input
                type="password"
                class="form-control"
                formControlName="password">

            <div
                class="text-danger"
                *ngIf="submitted && f['password'].errors">

                <small *ngIf="f['password'].errors['required']">
                    Password is required.
                </small>

                <small *ngIf="f['password'].errors['minlength']">
                    Minimum 6 characters.
                </small>

            </div>

        </div>

        <!-- Confirm Password -->

        <div class="mb-3">

            <label>Confirm Password</label>

            <input
                type="password"
                class="form-control"
                formControlName="confirmPassword">

            <div
                class="text-danger"
                *ngIf="submitted && registerForm.errors?.['passwordMismatch']">

                Passwords do not match.

            </div>

        </div>

        <!-- Age -->

        <div class="mb-3">

            <label>Age</label>

            <input
                type="number"
                class="form-control"
                formControlName="age">

            <div
                class="text-danger"
                *ngIf="submitted && f['age'].errors">

                <small *ngIf="f['age'].errors['required']">
                    Age is required.
                </small>

                <small *ngIf="f['age'].errors['min']">
                    Must be at least 18.
                </small>

            </div>

        </div>

        <!-- Terms -->

        <div class="form-check mb-3">

            <input
                type="checkbox"
                class="form-check-input"
                formControlName="terms">

            <label class="form-check-label">
                Accept Terms
            </label>

            <div
                class="text-danger"
                *ngIf="submitted && f['terms'].errors">

                Accept the terms.

            </div>

        </div>

        <button
            class="btn btn-primary me-2"
            type="submit">

            Submit

        </button>

        <button
            class="btn btn-secondary"
            type="button"
            (click)="onReset()">

            Reset

        </button>

    </form>

</div>
